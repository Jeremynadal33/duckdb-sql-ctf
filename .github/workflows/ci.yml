name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test-data-generator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --directory data_generator
      - name: Run tests
        run: uv run --directory data_generator pytest tests/ -v
      - name: Mypy
        run: uv run --directory data_generator mypy src/

  test-answer-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --directory answer_checker
      - name: Run tests
        run: uv run --directory answer_checker pytest tests/ -v
