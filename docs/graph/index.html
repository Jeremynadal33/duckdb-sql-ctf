<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graphe — DuckDB CTF</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .graph-wrap {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 44px);
      overflow: hidden;
    }

    /* ── Connection bar ── */
    .conn-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0 1.25rem;
      height: 48px;
      background: var(--c-surface);
      border-bottom: 1px solid var(--c-border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .conn-label {
      font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--c-muted);
    }
    .conn-input {
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      color: var(--c-text);
      font-family: inherit;
      font-size: 0.72rem;
      padding: 0.22rem 0.55rem;
      outline: none;
      width: 180px;
    }
    .conn-input:focus { border-color: var(--c-accent); }
    .conn-input::placeholder { color: var(--c-muted); }
    .conn-sep { width: 1px; height: 20px; background: var(--c-border); margin: 0 0.15rem; }
    .conn-btn {
      background: none;
      border: 1px solid var(--c-border);
      color: var(--c-muted);
      font-family: inherit;
      font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 0.28rem 0.7rem;
      cursor: pointer;
      transition: color 0.1s, border-color 0.1s, background 0.1s;
    }
    .conn-btn:hover { color: var(--c-accent); border-color: var(--c-accent); }
    .conn-btn.primary { border-color: var(--c-accent); color: var(--c-accent); }
    .conn-btn.primary:hover { background: rgba(240,192,0,0.08); }
    .conn-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    input[type="file"] { display: none; }

    .conn-status {
      margin-left: auto;
      font-size: 0.62rem;
      color: var(--c-muted);
      display: flex; align-items: center; gap: 0.4rem;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--c-muted);
      flex-shrink: 0;
    }
    .status-dot.ok  { background: var(--c-green); }
    .status-dot.err { background: var(--c-red); }
    .status-dot.loading { background: var(--c-accent); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Layout toolbar ── */
    .layout-bar {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0 1.25rem;
      height: 38px;
      background: var(--c-bg);
      border-bottom: 1px solid var(--c-border);
      flex-shrink: 0;
    }
    .layout-bar label { font-size: 0.55rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--c-muted); }
    .lay-btn {
      background: none; border: 1px solid var(--c-border);
      color: var(--c-muted); font-family: inherit;
      font-size: 0.58rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.2rem 0.55rem; cursor: pointer;
      transition: color 0.1s, border-color 0.1s;
    }
    .lay-btn:hover { color: var(--c-text); border-color: var(--c-muted); }
    .lay-btn.active { color: var(--c-accent); border-color: var(--c-accent); }
    .legend {
      margin-left: auto; display: flex; gap: 0.85rem;
      align-items: center; flex-wrap: wrap;
    }
    .leg { display: flex; align-items: center; gap: 0.3rem; font-size: 0.58rem; color: var(--c-muted); }
    .leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .leg-line { width: 16px; height: 2px; flex-shrink: 0; }

    /* ── Graph canvas ── */
    #cy {
      flex: 1;
      background: var(--c-bg);
      min-height: 0;
    }

    /* ── Empty state ── */
    #empty-state {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.75rem;
      color: var(--c-muted);
      font-size: 0.78rem;
    }
    #empty-state .big { font-size: 2rem; }

    /* ── Detail panel ── */
    .detail-panel {
      position: absolute;
      top: calc(44px + 48px + 38px + 12px);
      right: 12px;
      width: 270px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      padding: 0.9rem 1rem;
      z-index: 100;
      display: none;
    }
    .detail-panel.visible { display: block; }
    .detail-title { font-size: 0.9rem; font-weight: 700; color: var(--c-text); margin-bottom: 0.65rem; padding-right: 1.2rem; }
    .detail-row { display: flex; flex-direction: column; gap: 0.1rem; margin-bottom: 0.5rem; }
    .detail-key { font-size: 0.52rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--c-muted); }
    .detail-val { font-size: 0.8rem; color: var(--c-soft); word-break: break-all; line-height: 1.4; }
    .detail-val.flag { color: var(--c-green); font-weight: 700; }
    .detail-close { position: absolute; top: 0.5rem; right: 0.6rem; background: none; border: none; color: var(--c-muted); font-size: 0.9rem; cursor: pointer; }
    .detail-close:hover { color: var(--c-accent); }
  </style>
</head>
<body>
<div class="layout">

<aside class="sidebar">
  <a class="sidebar-logo" href="../" style="text-decoration:none">
    <span class="logo-duck">🦆</span>
    <div class="logo-text">
      <span class="logo-op">OPERATION</span>
      <span class="logo-name">CANARDS</span>
      <span class="logo-sub">DISPARUS</span>
    </div>
  </a>
  <nav class="sidebar-nav">
    <a class="nav-item" href="../scenarios/"><span class="nav-icon">⬡</span><span>SCENARIOS</span></a>
    <a class="nav-item" href="../leaderboard/"><span class="nav-icon">◈</span><span>LEADERBOARD</span></a>
    <a class="nav-item" href="../map/"><span class="nav-icon">◉</span><span>CARTE</span></a>
    <a class="nav-item active" href="../graph/"><span class="nav-icon">⬡</span><span>GRAPHE</span></a>
  </nav>
  <div class="sidebar-footer">
    <a href="../" class="back-link">&larr; ACCUEIL</a>
    <span class="agent-badge"></span>
  </div>
</aside>

<div class="main" style="position:relative; overflow:hidden">

  <header class="topbar">
    <div class="topbar-left">
      <a href="../" class="topbar-back">&larr;</a>
      <span class="topbar-label">RÉSEAU SOCIAL</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-badge" id="node-count">Non connecté</span>
    </div>
  </header>

  <div class="graph-wrap">

    <!-- Connection bar -->
    <div class="conn-bar">
      <span class="conn-label">Source</span>

      <!-- File tab -->
      <button class="conn-btn primary" id="btn-upload">⬡ Fichier .duckdb</button>
      <input type="file" id="file-input" accept=".duckdb,.json">

      <div class="conn-sep"></div>

      <!-- S3 tab -->
      <span class="conn-label">S3</span>
      <input class="conn-input" id="s3-key"    placeholder="access_key_id"    style="width:130px">
      <input class="conn-input" id="s3-secret" placeholder="secret_access_key" style="width:150px" type="password">
      <input class="conn-input" id="s3-bucket" placeholder="bucket" style="width:110px">
      <button class="conn-btn primary" id="btn-s3">Connecter S3</button>

      <div class="conn-status">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">En attente</span>
      </div>
    </div>

    <!-- Explore toolbar -->
    <div class="layout-bar">
      <label>MISE EN PAGE</label>
      <button class="lay-btn active" data-layout="cose">Force</button>
      <button class="lay-btn" data-layout="circle">Cercle</button>
      <button class="lay-btn" data-layout="breadthfirst">Arbre</button>
      <button class="lay-btn" data-layout="grid">Grille</button>

      <div class="conn-sep" style="margin:0 0.5rem"></div>

      <label>EXPLORER</label>
      <input class="conn-input" id="search-input" placeholder="Rechercher un nom…" style="width:160px">
      <button class="lay-btn" id="btn-reset-view" style="display:none">✕ Tout afficher</button>

      <div class="legend">
        <span class="leg"><span class="leg-dot" style="background:#4a90d9;border:2px solid #4a90d9"></span>Sélectionné</span>
<span class="leg" style="color:var(--c-muted);font-style:italic">Double-clic = isoler</span>
      </div>
    </div>

    <div id="empty-state">
      <span class="big">⬡</span>
      <span>Chargez un fichier <code>.duckdb</code> ou connectez-vous à S3 pour visualiser le réseau</span>
    </div>
    <div id="cy" style="display:none"></div>

  </div><!-- /graph-wrap -->

  <div class="detail-panel" id="detail-panel">
    <button class="detail-close" id="detail-close">✕</button>
    <div class="detail-title" id="detail-title"></div>
    <div id="detail-body"></div>
  </div>

</div><!-- /main -->
</div><!-- /layout -->

<script src="../agent.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28/dist/cytoscape.min.js"></script>
<script type="module" src="graph.js"></script>
</body>
</html>
